<body>

    <img class="project-gallery-image" src="images/gallery (2).png">
    <img class="project-gallery-image" src="images/gallery (3).png">
    <img class="project-gallery-image" src="images/gallery (4).png">

    <img class="project-gallery-image" src="images/gallery (12).png">

    <img class="project-gallery-image" src="images/gallery (14).png">

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox hidden">
  <div class="lightbox-content">

    <div class="lightbox-main">
      <img id="lightboxMainImg">
    </div>

    <div class="lightbox-thumbs" id="lightboxThumbs"></div>

  </div>

  <span class="lightbox-close" id="lightboxClose">&times;</span>
</div>

<script src="main.js"></script>
</body>
</html>
